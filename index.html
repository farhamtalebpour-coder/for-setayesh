<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Setayesh 💏</title>
<style>
body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', sans-serif;
    background:white;
    color:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

/* Lock Screen */
#lockScreen{
    display:flex;
    flex-direction:column;
    align-items:center;
}
input{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin:10px;
    text-align:center;
}
button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#ff0033;
    color:white;
    cursor:pointer;
}
.hidden{display:none;}

/* Main Screen */
#mainScreen{
    display:none;
    flex-direction:column;
    align-items:center;
}

/* استیکر متحرک بوسه */
.kiss{
    width:220px;
    height:220px;
    cursor:pointer;
    animation: beat 1.2s infinite;
    margin:20px;
    border-radius:20px;
}
@keyframes beat{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.25); }
}

/* پیام */
#message{
    font-size:20px;
    line-height:1.5;
    max-width:90%;
}
@media(max-width:500px){ #message{ font-size:16px; } }

/* Modal */
#modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    z-index:1000;
}
#modalContent{
    background:white;
    padding:30px;
    border-radius:15px;
    max-width:90%;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
#closeBtn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff0033;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="lockScreen">
    <h2>Enter Our Special Date ❤️</h2>
    <input type="password" id="dateInput" placeholder="YYYYMMDD">
    <br>
    <button onclick="checkDate()">Unlock</button>
</div>

<div id="mainScreen">
    <img src="https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif" 
         class="kiss" 
         onclick="openModal()" 
         alt="بوسه عاشقانه">
    <div id="message">مثل خون در رگ های من ممنون که آمدی و جانی دوباره برایم دادی تا بجنگم با این دنیای بد و نامرد</div>
</div>

<div id="modal">
    <div id="modalContent">
        <h3>❤️ ساعت شمار عشق ما ❤️</h3>
        <div id="timer" style="font-size:22px; line-height:1.8; margin:20px 0;"></div>
        <button id="closeBtn" onclick="closeModal()">بستن</button>
    </div>
</div>

<script>
// رمز ورود
const correctDate = "14041118";

function checkDate(){
    const input = document.getElementById("dateInput").value.trim();
    if(input === correctDate){
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "flex";
        startTimer();
    } else {
        document.body.style.background = "black";
        document.body.style.color = "white";
        alert("Only you know this date...");
    }
}

// modal
function openModal(){ 
    document.getElementById("modal").style.display = "flex"; 
}
function closeModal(){ 
    document.getElementById("modal").style.display = "none"; 
}

// تایمر دقیق با سال، ماه، روز، ساعت، دقیقه، ثانیه
function startTimer(){
    const timerDiv = document.getElementById("timer");
    const startDate = new Date(2026, 1, 7, 2, 47, 0); // دقیقاً ۱۴۰۴/۱۱/۱۸ شمسی

    function updateTimer(){
        const now = new Date();
        let years   = now.getFullYear() - startDate.getFullYear();
        let months  = now.getMonth() - startDate.getMonth();
        let days    = now.getDate() - startDate.getDate();
        let hours   = now.getHours() - startDate.getHours();
        let minutes = now.getMinutes() - startDate.getMinutes();
        let seconds = now.getSeconds() - startDate.getSeconds();

        // تنظیم مقادیر منفی
        if (seconds < 0) { minutes--; seconds += 60; }
        if (minutes < 0) { hours--; minutes += 60; }
        if (hours < 0) { days--; hours += 24; }
        if (days < 0) {
            months--;
            const lastDay = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
            days += lastDay;
        }
        if (months < 0) {
            years--;
            months += 12;
        }

        // قلب‌های عاشقانه (حداکثر ۵۰ تا)
        const totalHearts = Math.min(years * 12 + months + days + hours + minutes, 50);
        const hearts = '❤️'.repeat(totalHearts);

        timerDiv.innerHTML = `
            ${years} سال، ${months} ماه، ${days} روز،<br>
            ${hours} ساعت، ${minutes} دقیقه، ${seconds} ثانیه گذشته<br>
            <span style="font-size:28px;">${hearts}</span>
        `;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
}
</script>
</body>
    </html>
