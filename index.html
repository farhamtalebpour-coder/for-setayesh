    <!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Setayesh ❤️</title>
<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    background:white;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    transition:1s;
}

.screen{
    width:90%;
    max-width:500px;
}

/* Lock Screen */
input{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
    margin:10px;
    text-align:center;
}

button{
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#ff0033;
    color:white;
    cursor:pointer;
}

.hidden{display:none;}

#message{
    font-size:20px;
    margin-top:20px;
    line-height:1.5;
}
@media (max-width:500px){
    #message{
        font-size:16px;
    }
}

.emoji{
    font-size:60px;
    display:block;
    margin:20px auto;
}
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="screen" id="lockScreen">
    <h2>Enter Our Special Date ❤️</h2>
    <input type="password" id="dateInput" placeholder="YYYYMMDD">
    <br>
    <button onclick="checkDate()">Unlock</button>
</div>

<!-- Main Content -->
<div class="screen hidden" id="mainScreen">
    <span class="emoji">💏❤️‍🩹</span>
    <div id="message">مثل خون در رگ های من ممنون که آمدی و جانی دوباره برایم دادی تا بجنگم با این دنیای بد و نامرد</div>
</div>

<script>
const correctDate="14041118";
function checkDate(){
    const input = document.getElementById("dateInput").value;
    if(input===correctDate){
        document.getElementById("lockScreen").classList.add("hidden");
        document.getElementById("mainScreen").classList.remove("hidden");
    }else{
        document.body.style.background="black";
        document.body.style.color="white";
        alert("Only you know this date...");
    }
}
</script>
</body>
</html>
